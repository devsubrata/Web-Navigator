<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Vocabulary Cards</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            @media (max-width: 450px) {
                #cardsContainer {
                    grid-template-columns: repeat(1, minmax(0, 1fr)) !important;
                }
            }
        </style>
    </head>

    <body class="bg-gray-100 min-h-screen py-6 px-10 relative">
        <div class="max-w-[1600px] mx-auto">
            <!-- Title -->
            <h1 class="text-5xl font-bold text-gray-800 mb-6 text-center">Review Your Vocabulary</h1>

            <div class="flex justify-center items-center flex-col mb-8">
                <div class="flex justify-center items-center flex-wrap gap-y-2">
                    <!-- navigate BBC Learning English -->
                    <a
                        href="./BBC-Learning-English/BBC_Learning_English.html"
                        class="inline-block max-w-md text-sm text-gray-500 mr-4 py-2 px-4 rounded-lg border-0 text-xl bg-blue-500 text-white hover:bg-blue-600 cursor-pointer"
                        >BBC Learning English</a
                    >
                    <button
                        id="vocab-load"
                        class="inline-block max-w-md text-sm text-gray-500 mr-4 py-2 px-4 rounded-lg border-0 text-xl bg-blue-500 text-white hover:bg-blue-600 cursor-pointer"
                        title="load vocabulary file"
                    >
                        Load Vocabulary
                    </button>
                    <button
                        id="image-load"
                        class="inline-block max-w-md text-sm text-gray-500 mr-4 py-2 px-4 rounded-lg border-0 text-xl bg-blue-500 text-white hover:bg-blue-600 cursor-pointer"
                        title="Show Grammar Notes"
                    >
                        ImageCards
                    </button>
                    <button id="refreshBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">Refresh</button>
                </div>
                <div id="fileList" class="mt-4 flex flex-wrap gap-3 justify-center"></div>
                <input type="file" id="fileInput" accept=".csv,.md, .pdf" class="hidden" />
            </div>

            <h2 id="fileNameHeading" class="text-4xl font-semibold text-purple-700 mb-4 text-center"></h2>
            <div id="layoutControlDiv" class="flex justify-center items-center gap-2 mb-4 hidden">
                <div class="flex justify-center items-center gap-1">
                    <input type="radio" title="default" name="col_selection" value="0" checked />
                    <input type="radio" title="single-column layout" name="col_selection" value="1" />
                    <input type="radio" title="two-column layout" name="col_selection" value="2" />
                    <input type="radio" title="three-column layout" name="col_selection" value="3" />
                    <input type="radio" title="four-column layout" name="col_selection" value="4" />
                    <input type="radio" title="five-column layout" name="col_selection" value="5" />
                </div>
                <input
                    title="Change column layouts"
                    class="cursor-pointer"
                    type="range"
                    id="widthSlider"
                    min="150"
                    max="1500"
                    step="10"
                    value="250"
                />
                <span id="label" style="display: inline-block; width: 220px; text-align: left">Adjust Column Width</span>
            </div>
        </div>

        <div id="pdfSection" class="hidden mt-6">
            <!-- Controls -->
            <div class="flex flex-wrap items-center justify-center gap-3 mb-4">
                <button id="prevPage" class="px-3 py-1 bg-[#9bcbda] text-white rounded hover:bg-[#90d0e4]">◀️</button>

                <span class="text-gray-700"> Page <span id="pageNum">1</span> / <span id="pageCount">0</span> </span>

                <button id="nextPage" class="px-3 py-1 bg-[#9bcbda] text-white rounded hover:bg-[#90d0e4]">▶️</button>

                <!-- Jump -->
                <input id="pageInput" type="number" min="1" class="w-20 px-2 py-1 border rounded text-center" placeholder="Page" />

                <button id="goPage" class="px-3 py-1 bg-blue-700 text-white rounded">Go</button>

                <!-- Zoom -->
                <button id="zoomOut" class="px-3 py-1 bg-[#90e5d6] rounded">➖</button>
                <span id="zoomLevel">100%</span>
                <button id="zoomIn" class="px-3 py-1 bg-[#90e5d6] rounded">➕</button>
            </div>

            <!-- Canvas -->
            <div class="flex justify-center">
                <canvas id="pdfCanvas" class="shadow-lg rounded"></canvas>
            </div>
        </div>
        <div id="cardsContainer" class="grid gap-6 grid-cols-1 md:grid-cols-2 lg:grid-cols-3"></div>
        <div id="mdFileContainer" class="prose max-w-[1800px] mx-auto mt-6 text-xl"></div>
        <div id="imageContainer" class="relative flex flex-col justify-center items-center hidden">
            <!-- Navigation -->
            <div class="inline-flex items-center justify-center flex-wrap gap-3 sticky top-[0] bg-[#015a29b7] p-1.5 rounded-md">
                <!-- Download -->
                <div>
                    <button
                        id="downloadImage"
                        title="Download loaded script"
                        class="px-2.5 py-1 cursor-pointer outline-none border-none rounded-md bg-[#f0f0f0] hover:bg-gray-300"
                    >
                        ⮟
                    </button>
                </div>
                <!-- Prev / Next -->
                <div class="flex items-center gap-1">
                    <button id="prevImage" class="px-2.5 py-1 cursor-pointer rounded-md bg-[#f0f0f0] hover:bg-gray-300">◀</button>
                    <span id="imgCount" class="inline-block px-2.5 py-1 rounded-md bg-white"> </span>
                    <button id="nextImage" class="px-2.5 py-1 cursor-pointer rounded-md bg-[#f0f0f0] hover:bg-gray-300">▶</button>
                </div>
                <!-- Selects -->
                <div class="flex gap-1">
                    <select id="imgFolder" class="px-2.5 py-1 rounded-md cursor-pointer outline-none border-none"></select>
                    <select id="loadedImgList" class="px-2.5 py-1 rounded-md cursor-pointer outline-none border-none"></select>
                </div>
                <!-- Zoom -->
                <div class="flex gap-1">
                    <button id="imgZoomIn" class="px-2.5 py-1 cursor-pointer rounded-md bg-[#f0f0f0] hover:bg-gray-300">➕</button>
                    <button id="imgZoomOut" class="px-2.5 py-1 cursor-pointer rounded-md bg-[#f0f0f0] hover:bg-gray-300">➖</button>
                </div>
                <!-- Up / Down -->
                <div class="flex gap-1">
                    <button id="up" class="p-0.5 text-lg cursor-pointer rounded-md bg-[#f0f0f0] hover:bg-gray-300">⏫</button>
                    <button id="down" class="p-0.5 text-lg cursor-pointer rounded-md bg-[#f0f0f0] hover:bg-gray-300">⏬</button>
                </div>
                <div>
                    <button id="placeTop" class="p-0.5 text-lg cursor-pointer rounded-md bg-[#f0f0f0] hover:bg-gray-300">🔝</button>
                </div>
            </div>
            <!-- Image Wrapper -->
            <div id="img-wrapper" class="text-center h-[95vh] overflow-y-auto border-2 border-blue-500 rounded-xl max-w-[98vw] mb-5">
                <img
                    src="./resource/ReadingArticle/IELTS Reading Topics.png"
                    class="w-full object-cover transition-transform duration-300 origin-top rounded-xl"
                />
            </div>
        </div>

        <div id="loaderOverlay" class="hidden fixed inset-0 flex items-center justify-center z-50 bg-black/40">
            <div class="flex flex-col items-center gap-3">
                <!-- Spinner -->
                <div class="w-20 h-20 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <!-- Text -->
                <p class="text-indigo-800 text-xl font-medium">Loading...</p>
            </div>
        </div>

        <div class="fixed bottom-6 right-6 flex flex-col gap-1 z-50">
            <button id="scrollUp" title="Go up" class="text-2xl">⏫</button>
            <button id="scrollDown" title="Go down" class="text-2xl">⏬</button>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
        <script src="./vocab-data/vocabFileList.js"></script>
        <script src="./resource/helpfulFn.js"></script>

        <script type="module">
            import { grammarCards, idiomCards, phrasalVerbCards, categoryList, loadedImageList } from "./vocab-data/img/CardList.js";

            let pdfDoc = null;
            let currentPage = 1;
            let scale = 1.2;
            const canvas = document.getElementById("pdfCanvas");
            const ctx = canvas.getContext("2d");

            const btn = document.getElementById("vocab-load");
            const input = document.getElementById("fileInput");
            const container = document.getElementById("cardsContainer");
            const imageContainer = document.getElementById("imageContainer");

            document.getElementById("image-load").onclick = () => {
                clearAllViews();
                document.getElementById("fileNameHeading").innerHTML = "";
                imageContainer.classList.remove("hidden");
                imageContainer.scrollIntoView({ behavior: "smooth", block: "start" });
            };

            document.getElementById("placeTop").onclick = () => {
                imageContainer.scrollIntoView({ behavior: "smooth", block: "start" });
            };

            document.getElementById("refreshBtn").addEventListener("click", () => {
                location.reload();
            });
            function showLoader() {
                document.getElementById("loaderOverlay").classList.remove("hidden");
            }

            function hideLoader() {
                document.getElementById("loaderOverlay").classList.add("hidden");
            }

            function renderUnifiedFileList() {
                const list = document.getElementById("fileList");
                list.innerHTML = ""; // Clear any existing buttons

                const allFiles = [
                    ...vocabFiles.map((f) => ({ ...f, type: "csv" })),
                    ...markDownFile.map((f) => ({ ...f, type: "md" })),
                    ...pdfFiles.map((f) => ({ ...f, type: "pdf" })),
                ];

                allFiles.forEach((fileObj) => {
                    const btn = document.createElement("button");

                    const { backgroundColor, textColor, hoverColor } = fileObj;
                    btn.className = `${backgroundColor} ${textColor} px-4 py-2 rounded-lg hover:${hoverColor} transition`;

                    // Remove extension for display
                    let cleanName = fileObj.fileName.replace(/\.(csv|md|pdf)/, "");
                    btn.textContent = cleanName;

                    // Assign proper loader function
                    btn.onclick = () => {
                        switch (fileObj.type) {
                            case "csv":
                                loadCSVFromFolder(fileObj);
                                break;
                            case "md":
                                loadMarkdown(fileObj);
                                break;
                            case "pdf":
                                loadPDFFromFolder(fileObj);
                                break;
                        }
                    };

                    list.appendChild(btn);
                });
            }
            function loadCSVFromFolder(fileObj) {
                fetch(`vocab-data/csv/${fileObj.fileName}?t=${Date.now()}`)
                    .then((res) => res.text())
                    .then((text) => {
                        clearAllViews(); // 🔥 move here (after data ready)
                        const cleanName = fileObj.fileName.replace(".csv", "");
                        document.getElementById("fileNameHeading").innerHTML = `
                            <a href="${fileObj.url}" target="_blank" class="hover:underline hover:text-purple-900 transition">
                                ${cleanName}
                            </a>
                        `;
                        renderCards(text);
                    })
                    .catch((err) => {
                        console.error("Error loading CSV:", err);
                        alert("Failed to load CSV file");
                    });
            }

            loadCSVFromFolder({
                fileName: "69 Advanced Words (C1 + C2) to Get a Band 9.csv",
                url: "https://www.youtube.com/watch?v=_s1rIKaoAyM",
                ...colorSet1,
            });

            function loadMarkdown(fileObj) {
                fetch(`vocab-data/md/${fileObj.fileName}?t=${Date.now()}`)
                    .then((res) => res.text())
                    .then((mdText) => {
                        clearAllViews(); // 🔥 AFTER fetch
                        const cleanName = fileObj.fileName.replace(".md", "");
                        document.getElementById("fileNameHeading").innerHTML = `
                            <a href="${fileObj.url}" target="_blank" class="hover:underline text-purple-700">
                                ${cleanName}
                            </a>
                        `;
                        document.getElementById("mdFileContainer").innerHTML = marked.parse(mdText);
                    })
                    .catch((err) => console.error("Markdown load error:", err));
            }
            function loadPDFFromFolder(fileObj) {
                showLoader();
                clearAllViews();
                fetch(`vocab-data/pdf/${fileObj.fileName}?t=${Date.now()}`)
                    .then((res) => res.arrayBuffer())
                    .then((buffer) => loadPDFBuffer(buffer))
                    .then(() => {
                        const cleanName = fileObj.fileName.replace(".pdf", "");
                        document.getElementById("fileNameHeading").innerHTML = `
                            <a href="${fileObj.url}" target="_blank" class="hover:underline text-purple-700">
                                ${cleanName}
                            </a>
                        `;
                    })
                    .catch((err) => console.error("PDF load error:", err));
            }
            renderUnifiedFileList();

            //TODO:------Render pdf file--------------
            function renderPage(num) {
                pdfDoc.getPage(num).then((page) => {
                    const viewport = page.getViewport({ scale });
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    const renderTask = page.render({
                        canvasContext: ctx,
                        viewport: viewport,
                    });
                    renderTask.promise.then(() => {
                        hideLoader(); // 🔥 hide AFTER render completes
                    });
                    document.getElementById("pageNum").textContent = num;
                    document.getElementById("zoomLevel").textContent = Math.round(scale * 100) + "%";
                });
            }
            function loadPDF(file) {
                const reader = new FileReader();
                reader.onload = function () {
                    const typedArray = new Uint8Array(this.result);
                    pdfjsLib.getDocument(typedArray).promise.then((pdf) => {
                        pdfDoc = pdf;
                        currentPage = 1;
                        document.getElementById("pageCount").textContent = pdf.numPages;
                        document.getElementById("pdfSection").classList.remove("hidden");
                        renderPage(currentPage);
                    });
                };
                reader.readAsArrayBuffer(file);
            }
            function loadPDFBuffer(buffer) {
                const typedArray = new Uint8Array(buffer);
                pdfjsLib.getDocument(typedArray).promise.then((pdf) => {
                    pdfDoc = pdf;
                    currentPage = 1;
                    document.getElementById("pageCount").textContent = pdf.numPages;
                    document.getElementById("pdfSection").classList.remove("hidden");
                    renderPage(currentPage);
                });
            }
            // Next
            document.getElementById("nextPage").onclick = () => {
                if (currentPage >= pdfDoc.numPages) return;
                currentPage++;
                renderPage(currentPage);
            };
            // Prev
            document.getElementById("prevPage").onclick = () => {
                if (currentPage <= 1) return;
                currentPage--;
                renderPage(currentPage);
            };
            // Jump
            document.getElementById("goPage").onclick = () => {
                const page = parseInt(document.getElementById("pageInput").value);
                if (page >= 1 && page <= pdfDoc.numPages) {
                    currentPage = page;
                    renderPage(currentPage);
                }
            };
            // Zoom In
            document.getElementById("zoomIn").onclick = () => {
                scale += 0.2;
                renderPage(currentPage);
            };
            // Zoom Out
            document.getElementById("zoomOut").onclick = () => {
                if (scale <= 0.4) return;
                scale -= 0.2;
                renderPage(currentPage);
            };

            //TODO:------View vocab by file upload--------------
            // Trigger file input on button click
            btn.addEventListener("click", () => input.click());

            // Handle file selection
            input.addEventListener("change", handleFile);

            function clearAllViews() {
                document.getElementById("cardsContainer").innerHTML = "";
                document.getElementById("mdFileContainer").innerHTML = "";
                document.getElementById("pdfSection").classList.add("hidden");
                document.getElementById("layoutControlDiv").classList.add("hidden");
                document.getElementById("imageContainer").classList.add("hidden");
            }

            function handleFile(event) {
                const file = event.target.files[0];
                if (!file) return;

                showLoader();
                clearAllViews();

                const fileName = file.name.replace(/\.[^/.]+$/, "");
                const ext = file.name.split(".").pop().toLowerCase();

                const heading = document.getElementById("fileNameHeading");
                const cardsContainer = document.getElementById("cardsContainer");
                const mdContainer = document.getElementById("mdFileContainer");

                // Set heading
                heading.textContent = fileName;

                const reader = new FileReader();

                reader.onload = function (e) {
                    const text = e.target.result;

                    if (ext === "pdf") {
                        loadPDF(file);
                    } else if (ext === "md") {
                        mdContainer.innerHTML = marked.parse(text);
                    } else {
                        renderCards(text);
                    }
                    hideLoader(); // 🔥 hide after done
                };
                reader.readAsText(file);
                // 🔥 IMPORTANT: allow same file re-upload
                input.value = "";
            }

            function renderCards(text) {
                container.innerHTML = ""; // Clear previous cards
                document.getElementById("mdFileContainer").innerHTML = ""; // 🔥 clear md

                document.getElementById("layoutControlDiv").classList.remove("hidden");

                // Split lines by ;\n or just \n
                const lines = text.split(/;\n|\n/).filter((line) => line.trim() !== "");

                lines.forEach((line, sl) => container.appendChild(renderCard(line, sl)));
            }

            // Unified card renderer (supports old & new formats)
            function renderCard(line, sl) {
                const isDetailed = line.includes("|") && line.includes(":");
                const card = document.createElement("div");
                card.className = `
                    bg-white rounded-2xl shadow-md p-5
                    hover:shadow-xl transition duration-300
                `;

                if (isDetailed) {
                    if (line.startsWith("BBC")) {
                        const items = line.split("|").map((s) => s.trim());

                        const headItems = items[0].split(";");
                        const [head, episodeURL, audioURL] = [headItems[0].slice(4).trim(), headItems[1].trim(), headItems[2].trim()];
                        const details = items.slice(1);

                        card.innerHTML = `
                            <div class="relative">
                                <span class="
                                    absolute -top-3 -left-3
                                    w-8 h-8 flex items-center justify-center
                                    rounded-full bg-indigo-400 text-white
                                    text-sm font-semibold shadow-md
                                ">
                                    ${sl + 1}
                                </span>
                            </div>
                            <h2 class="text-3xl font-bold text-indigo-700 mb-3 text-center">
                                <a href="${episodeURL}" target="_blank">${head}</a>
                            </h2>
                            <div class="my-3 h-[3px] bg-gradient-to-r from-transparent via-orange-800 to-transparent"></div>
                            <div class="flex justify-center mb-2">
                                <audio controls=""><source src="${audioURL}" type="audio/mpeg"></audio>
                            </div>
                            <div class="flex flex-col gap-2">
                                ${details.map((d) => formatDetail(d)).join("")}
                            </div>
                        `;
                    } else {
                        // New detailed format
                        const items = line.split("|").map((s) => s.trim());
                        const head = items[0];
                        const details = items.slice(1);

                        card.innerHTML = `
                            <div class="relative">
                                <span class="
                                    absolute -top-3 -left-3
                                    w-8 h-8 flex items-center justify-center
                                    rounded-full bg-indigo-400 text-white
                                    text-sm font-semibold shadow-md
                                ">
                                    ${sl + 1}
                                </span>
                            </div>
                            <h2 class="text-2xl font-bold text-indigo-700 mb-3 text-center">${head}</h2>
                            <div class="my-3 h-[3px] bg-gradient-to-r from-transparent via-orange-800 to-transparent"></div>
                            <div class="flex flex-col gap-2">
                                ${details.map((d) => formatDetail(d)).join("")}
                            </div>
                        `;
                    }
                } else if (line.includes(";")) {
                    const items = line.split(";").map((i) => i.trim());

                    const head = items[0];
                    const synonyms = items.slice(1);

                    const bullets = ["✦&nbsp;", "🕷️", "★&nbsp;", "🪰", "⭐", "❀&nbsp;"];
                    const bullet = bullets[Math.floor(Math.random() * bullets.length)];

                    card.innerHTML = `
                        <div class="flex justify-center mb-2">
                            <span class="
                                w-10 h-10 flex items-center justify-center
                                rounded-full bg-indigo-100 text-indigo-700
                                font-bold text-lg shadow-sm
                            ">
                                ${sl + 1}
                            </span>
                        </div>
                        <h2 class="text-2xl font-bold text-indigo-700 mb-3 text-center">
                            ${head}
                        </h2>
                        <div class="my-3 h-[3px] bg-gradient-to-r from-transparent via-orange-800 to-transparent"></div>
                        <div class="flex flex-col gap-2 items-start">
                            ${synonyms
                                .map(
                                    (s) => `
                            <span class="bg-gray-200 text-violet-950 font-semibold flex p-1 rounded text-xl hover:bg-blue-100 hover:text-blue-700 transition"><span>${bullet}</span><span>${highlightTerms(s)}</span></span>`,
                                )
                                .join("")}
                        </div>
                    `;
                } else {
                    let html = ``;
                    if (line.includes("{p}")) {
                        line = line.replace("{p}", "");
                        const items = line.split(",").map((i) => i.trim());
                        const head = items[0];
                        const paragraph = items.slice(1).join(", ");
                        html = `
                            <div class="flex justify-center mb-2">
                                <span class="
                                    w-10 h-10 flex items-center justify-center
                                    rounded-full bg-indigo-100 text-indigo-700
                                    font-bold text-lg shadow-sm
                                ">
                                    ${sl + 1}
                                </span>
                            </div>
                            <h2 class="text-2xl font-bold text-indigo-700 mb-3 text-center capitalize">${head}</h2>
                            <div class="my-3 h-[3px] bg-gradient-to-r from-transparent via-orange-800 to-transparent"></div>
                            <div class="flex flex-wrap gap-2 justify-center">
                                <span class="bg-gray-200 text-violet-950 px-4 py-1 rounded text-xl hover:bg-blue-100 hover:text-blue-700 transition">${highlightTerms(paragraph)}</span>
                            </div>
                        `;
                    } else {
                        // Old simple format
                        line = line.replace(/;$/, ""); // remove trailing semicolon
                        const items = line.split(",").map((i) => i.trim());
                        const head = items[0];
                        const synonyms = items.slice(1);

                        html = `
                            <div class="flex justify-center mb-2">
                                <span class="
                                    w-10 h-10 flex items-center justify-center
                                    rounded-full bg-indigo-100 text-indigo-700
                                    font-bold text-lg shadow-sm
                                ">
                                    ${sl + 1}
                                </span>
                            </div>
                            <h2 class="text-2xl font-bold text-indigo-700 mb-3 text-center capitalize">${head}</h2>
                            <div class="my-3 h-[3px] bg-gradient-to-r from-transparent via-orange-800 to-transparent"></div>
                            <div class="flex flex-wrap gap-2 justify-center">
                                ${synonyms.map((s) => `<span class="bg-gray-200 text-violet-950 font-semibold px-4 py-1 rounded-full text-xl hover:bg-blue-100 hover:text-blue-700 transition">${highlightTerms(s)}</span>`).join("")}
                            </div>
                        `;
                    }
                    card.innerHTML = html;
                }

                return card;
            }

            // Format detail for new format (split by semicolon into spans)
            function formatDetail(text) {
                const isList = text.includes("✦");
                if (isList) text = text.replace("✦", "");
                const bullets = ["✦&nbsp;", "🕷️", "■&nbsp;", "★&nbsp;", "🪰", "⭐", "❀&nbsp;", "💠"];
                const bullet = bullets[Math.floor(Math.random() * bullets.length)];

                const parts = text.split(":");
                if (parts.length < 2) return `<div class="text-gray-700">${text}</div>`;

                const label = parts[0].trim();
                const content = parts.slice(1).join(":").trim();

                // Split content by semicolon
                const items = content
                    .split(";")
                    .map((i) => i.trim())
                    .filter((i) => i);

                let html = ``;

                if (!isList)
                    html = `
                        <div class="flex flex-col gap-1">
                            <span class="font-semibold text-rose-700 text-2xl">${label}:</span>
                            <div class="flex flex-wrap gap-3">
                                ${items.map((s) => `<span class="bg-gray-200 text-violet-950 flex items-center justify-center px-4 py-1 rounded-[8px] text-xl hover:bg-blue-100 hover:text-blue-700 transition"><span>${highlightTerms(s)}</span></span>`).join("")}
                            </div>
                        </div>
                    `;
                else
                    html = `
                        <div class="flex flex-col gap-1">
                                    <span class="font-semibold text-rose-700 text-2xl">${label}:</span>
                                <div class="flex flex-col gap-2 items-start">
                                    ${items
                                        .map(
                                            (s) => `
                                    <span class="bg-gray-200 text-violet-950 flex p-1 pr-2 rounded text-xl hover:bg-blue-100 hover:text-blue-700 transition"><span>${bullet}</span><span>${highlightTerms(s)}</span></span>`,
                                        )
                                        .join("")}
                                </div>
                        </div>
                    `;

                return html;
            }

            const scrollUpBtn = document.getElementById("scrollUp");
            const scrollDownBtn = document.getElementById("scrollDown");
            // Scroll to top
            scrollUpBtn.addEventListener("click", () => {
                window.scrollTo({
                    top: 0,
                    behavior: "smooth",
                });
            });
            // Scroll to bottom
            scrollDownBtn.addEventListener("click", () => {
                window.scrollTo({
                    top: document.body.scrollHeight,
                    behavior: "smooth",
                });
            });

            const slider = document.getElementById("widthSlider");

            const radios = document.querySelectorAll('input[name="col_selection"]');
            radios.forEach((radio) => {
                radio.onchange = () => {
                    updateGrid(slider.value);
                };
            });

            function updateGrid(width) {
                const selectedColumnRadio = document.querySelector('input[name="col_selection"]:checked');
                const selectedColumns = parseInt(selectedColumnRadio.value);

                if (!selectedColumns) container.style.gridTemplateColumns = `repeat(auto-fit, minmax(${width}px, 1fr))`;
                else {
                    container.style.gridTemplateColumns = `repeat(${selectedColumns}, ${width}px)`;
                    container.style.justifyContent = `center`;
                }
            }

            // on change
            slider.addEventListener("input", (e) => {
                const value = e.target.value;
                updateGrid(value);
                const label = document.getElementById("label");
                label.textContent = `Column Width: ${value}px`;
            });

            //TODO:---------------- Handling Image-----------
            let currentImgIndex = 0;

            const imgDirSelect = document.getElementById("imgFolder");
            const loadedImgList = document.getElementById("loadedImgList");
            const img = document.querySelector("#img-wrapper img");
            const imgCount = document.getElementById("imgCount");
            const imgWrapper = document.getElementById("img-wrapper");

            categoryList.forEach((t, i) => {
                const option = document.createElement("option");
                option.value = t;
                option.textContent = t;
                if (i === 0) option.setAttribute("selected", true);
                imgDirSelect.appendChild(option);
            });

            imgDirSelect.addEventListener("change", setImageDirectory);
            loadedImgList.addEventListener("change", () => {
                let dirName = imgDirSelect.value;
                const selectedName = loadedImgList.value; // no extension

                let imgList = loadedImageList(dirName);
                let matched = imgList.find((image) => image === selectedName);

                if (matched) {
                    img.src = `./vocab-data/img/${dirName}/${matched}`;
                    currentImgIndex = imgList.findIndex((image) => image === matched);
                    imgCount.textContent = `${currentImgIndex + 1} / ${imgList.length}`;
                }
            });

            function setImageDirectory() {
                let dirName = imgDirSelect.value;
                let imgList = loadedImageList(dirName);

                loadedImgList.innerHTML = "";
                imgList.forEach((t, i) => {
                    const option = document.createElement("option");
                    option.value = t;
                    option.textContent = getImageName(t);
                    if (i === 0) option.setAttribute("selected", true);
                    loadedImgList.appendChild(option);
                });
                img.src = `./vocab-data/img/${dirName}/${imgList[0]}`;
                currentImgIndex = 0;
                imgCount.textContent = `${currentImgIndex + 1} / ${imgList.length}`;

                document.getElementById("prevImage").onclick = () => {
                    if (currentImgIndex === 0) return;
                    img.src = `./vocab-data/img/${dirName}/${imgList[--currentImgIndex]}`;
                    imgCount.textContent = `${currentImgIndex + 1} / ${imgList.length}`;
                    loadedImgList.value = imgList[currentImgIndex];
                };

                document.getElementById("nextImage").onclick = () => {
                    if (currentImgIndex === imgList.length - 1) return;
                    img.src = `./vocab-data/img/${dirName}/${imgList[++currentImgIndex]}`;
                    imgCount.textContent = `${currentImgIndex + 1} / ${imgList.length}`;
                    loadedImgList.value = imgList[currentImgIndex];
                };

                let scale = 1;
                document.getElementById("imgZoomIn").onclick = () => {
                    scale += 0.05;
                    img.style.transform = `scale(${scale})`;
                };

                document.getElementById("imgZoomOut").onclick = () => {
                    scale = Math.max(0.3, scale - 0.05);
                    img.style.transform = `scale(${scale})`;
                };
            }
            setImageDirectory();

            document.getElementById("up").onclick = () => {
                imgWrapper.scrollTo({ top: 0, behavior: "smooth" });
            };
            document.getElementById("down").onclick = () => {
                imgWrapper.scrollTo({ top: imgWrapper.scrollHeight, behavior: "smooth" });
            };
            document.getElementById("downloadImage").onclick = () => downloadImage(img);
        </script>
    </body>
</html>
