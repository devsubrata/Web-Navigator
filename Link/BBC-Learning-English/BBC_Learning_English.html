<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>BBC Learning English</title>
        <style>
            body {
                padding: 0 10px 50px 10px;
            }
            .VocabBtn,
            #programSelection {
                padding: 10px 15px;
                border: 3px solid #80deea;
                border-radius: 10px;
                background-color: rgba(255, 255, 255, 0.8);
                color: #007c91;
                font-size: 20px;
                cursor: pointer;
                outline: none;
                padding-right: 30px;
            }
            .VocabBtn {
                text-decoration: none;
                margin-bottom: 5px;
                display: inline-block;
            }
            .heading {
                font-size: 35px;
                font-weight: bold;
                text-align: center;
                color: #a713ec;
                text-shadow:
                    0 0 10px rgba(0, 150, 255, 0.8),
                    0 0 20px rgba(0, 150, 255, 0.6);
                margin-bottom: 10px;
            }

            .full-program-name {
                font-size: 24px;
                text-align: center;
                color: #016b31;
                border-top: 3px solid rgba(187, 2, 94, 0.747);
                border-bottom: 3px solid rgba(187, 2, 94, 0.747);
                display: inline-block;
                padding: 3px 20px;
                margin-top: 10px;
            }
            .nav-btns button {
                position: fixed;
                left: 5px;
                border: none;
                outline: none;
                cursor: pointer;
                background: none;
                font-size: 20px;
                margin: 0;
                padding: 0;
            }
            .nav-btns .go-up {
                top: 95vh;
            }
            .nav-btns .go-down {
                top: 10px;
            }

        </style>
    </head>
    <body>
        <h1 class="heading">Welcome To Learning English With BBC</h1>
        <div style="text-align: center; margin-top: 10px">
            <a href="../vocabulary.html" class="VocabBtn">Vocab Page</a>
            <select name="programList" id="programSelection">
                <option value="">Select a program</option>
            </select>
            <div class="nav-btns">
                <button class="go-up" >⏫</button>
                <button class="go-down">⏬</button>
            </div>
            </div>
        </div>
        <div style="text-align: center; margin: 0">
            <h2 class="full-program-name"></h2>
        </div>
        <div
            class="container"
            style="text-align: center; display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; align-items: center"
        ></div>
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"
            integrity="sha512-z8IYLHO8bTgFqj+yrPyIJnzBDf7DDhWwiEsk4sY+Oe6J2M+WQequeGS7qioI5vT6rXgVRb4K1UVQC5ER7MKzKQ=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        ></script>
        <script src="BBC-Learning-English-Resources.js"></script>
        <script src="BBC-Learning-English.js"></script>
    </body>
</html>
